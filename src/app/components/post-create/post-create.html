<div class="row justify-content-center">
  <div class="col-md-8">

    <form [formGroup]="postForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="mb-3">
        <label for="title" class="form-label">Title:</label>
        <input
          id="title"
          type="text"
          class="form-control"
          [class.is-invalid]="submitted && f['title'].errors"
          [class.is-valid]="submitted && !f['title'].errors"
          formControlName="title"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['title'].errors">
          <span *ngIf="f['title'].errors?.['required']">Title is required</span>
          <span *ngIf="f['title'].errors?.['minlength']">Title should be at least 5 characters</span>
          <span *ngIf="f['title'].errors?.['maxlength']">Title should not exceed 150 characters</span>
        </div>
      </div>

      <div class="mb-3">
        <label for="categoryId" class="form-label">Category:</label>
        <select
          id="categoryId"
          class="form-select"
          [class.is-invalid]="submitted && f['categoryId'].errors"
          [class.is-valid]="submitted && !f['categoryId'].errors"
          formControlName="categoryId"
        >
          <option value=""></option>
          <option *ngFor="let cat of (categories$ | async)" [value]="cat.id">
            {{ cat.name }}
          </option>
        </select>
        <div class="invalid-feedback" *ngIf="submitted && f['categoryId'].errors?.['required']">
          Category is required
        </div>
      </div>

      <div class="mb-3">
        <label for="content" class="form-label">Content:</label>
        <textarea
          id="content"
          class="form-control"
          rows="6"
          [class.is-invalid]="submitted && f['content'].errors"
          [class.is-valid]="submitted && !f['content'].errors"
          formControlName="content"
        ></textarea>
        <div class="invalid-feedback" *ngIf="submitted && f['content'].errors">
          <span *ngIf="f['content'].errors?.['required']">Content is required</span>
          <span *ngIf="f['content'].errors?.['maxlength']">Post content should not exceed 2500 characters</span>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-danger" (click)="goBack()">Close</button>
        <button type="submit" class="btn btn-success">Post message</button>
      </div>

    </form>
  </div>
</div>
