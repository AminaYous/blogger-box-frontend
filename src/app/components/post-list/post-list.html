<div class="row">
  <div class="col-12 mb-3">
    <h2>Derniers articles</h2>
  </div>
</div>
<div class="row" *ngIf="(posts$ | async) as posts; else noPosts">
  <div class="col-md-6 mb-4" *ngFor="let post of posts">
    <app-post-list-item [post]="post"></app-post-list-item>
  </div>
</div>

<ng-template #noPosts>
  <div class="alert alert-info">Aucun article à afficher.</div>
</ng-template>
